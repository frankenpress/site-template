name: lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: mbstring, xml
          coverage: none

      # Validate composer.json / composer.lock structure + license / version
      # fields BEFORE installing. `--strict` catches issues `composer install`
      # would silently work around (inconsistent lock, missing required keys,
      # suggested-but-unwise patterns). `--no-check-publish` skips publishing-
      # specific checks the site-template doesn't need (this isn't a published
      # composer package; it's a site image source).
      - name: composer validate
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHPCS
        run: composer lint

      - name: composer audit
        run: composer audit --abandoned=fail
