name: build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Determines whether the build job should run.
  #
  # In a fork created from this template, skip the very first push while
  # template-cleanup.yml is still present — cleanup self-deletes the
  # workflow and then triggers this job manually so the published image
  # reflects the substituted Dockerfile labels.
  # On the upstream template itself we always run — build is the smoke
  # test for template changes.
  #
  # (Job-level `if` doesn't allow `hashFiles`, hence this gate-via-output
  # pattern.)
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          set -euo pipefail
          if [ "${{ github.repository }}" = "EightOEight/fp-site-template" ]; then
            echo "should_build=true" >>"$GITHUB_OUTPUT"
          elif [ -f .github/workflows/template-cleanup.yml ]; then
            echo "should_build=false" >>"$GITHUB_OUTPUT"
            echo "Skipping build: template-cleanup.yml is still present (will run after cleanup)."
          else
            echo "should_build=true" >>"$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: ${{ needs.gate.outputs.should_build == 'true' }}
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          LOWER_REGISTRY="$(echo "${REGISTRY}" | tr '[:upper:]' '[:lower:]')"
          TAGS=()
          TAGS+=("${LOWER_REGISTRY}:${SHORT_SHA}")
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS+=("${LOWER_REGISTRY}:latest")
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VTAG="${GITHUB_REF#refs/tags/}"
            TAGS+=("${LOWER_REGISTRY}:${VTAG}")
          fi
          printf 'tags<<EOF\n%s\nEOF\n' "$(IFS=$'\n'; echo "${TAGS[*]}")" >>"$GITHUB_OUTPUT"

      - name: Build (load locally)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: fp-site:test
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            SOURCE_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Smoke test the built image
        run: |
          docker run --rm fp-site:test sh -c '
            set -ex
            test -f /app/web/wp/wp-blog-header.php
            test -f /app/web/index.php
            test -f /app/web/wp-config.php
            test -f /app/config/application.php
            # composer-installed fp-mu-plugin (the runtime-baked /fp dir is
            # removed in the final stage of the Dockerfile).
            test -d /app/web/app/mu-plugins/fp-mu-plugin/src
            test ! -d /app/web/app/mu-plugins/fp
            # humanmade/s3-uploads is type:wordpress-plugin but composer.json
            # redirects it to mu-plugins/ via per-package installer-paths so it
            # appears as Must-Use in wp-admin (loaded by web/app/mu-plugins/s3-uploads.php).
            test -d /app/web/app/mu-plugins/s3-uploads
            test -f /app/web/app/mu-plugins/s3-uploads.php
            test ! -d /app/web/app/plugins/s3-uploads
            php -r "require \"/app/vendor/autoload.php\"; if ( ! class_exists( \"FrankenPress\\\\MuPlugin\" ) ) { fwrite( STDERR, \"FrankenPress\\\\MuPlugin not autoloaded\\n\" ); exit( 1 ); }"
          '

      - name: Push (multi-arch, multi-tag)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # arm64 build runs under QEMU emulation. Composer + WP core
          # extraction are I/O-heavy not CPU-heavy, so the slowdown is
          # modest (~2-3 minutes additional vs amd64-only).
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            SOURCE_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
